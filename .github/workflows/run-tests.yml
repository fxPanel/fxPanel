name: Run Tests for Workspaces

on:
    push:
        branches:
            - master
    pull_request:
        branches:
            - '**'

jobs:
    run-tests:
        name: 'Run Unit Testing'
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Use Node.js 22
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            - name: Download all modules
              run: npm ci

            - name: Create .env file
              run: |
                  echo TXDEV_FXSERVER_PATH=$(pwd)/fxserver > .env
                  echo TXDEV_VITE_URL='http://localhost:40122' >> .env

            - name: Run Tests
              env:
                  CI: true
              run: npm run test --workspaces

            # Panel/NUI typecheck currently has pre-existing TS errors; keep this step visible but non-blocking.
            - name: Typecheck all workspaces (informational)
              continue-on-error: true
              run: npm run typecheck --workspaces --if-present

            - name: Lint all workspaces (informational)
              continue-on-error: true
              run: npm run lint --workspaces --if-present

    build-matrix:
        name: 'Build (${{ matrix.os }})'
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, windows-latest, macos-latest]
        runs-on: ${{ matrix.os }}

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Use Node.js 22
              uses: actions/setup-node@v4
              with:
                  node-version: 22

            # `npm ci` has a long-standing bug (npm/cli#4828) where it skips
            # platform-specific optional deps if the lockfile was generated on
            # a different OS. That breaks @swc/core (and other native bindings)
            # on macOS hosts. `npm install --include=optional` resolves them
            # fresh against the current platform.
            - name: Download all modules
              shell: bash
              run: |
                  if [ "$RUNNER_OS" = "macOS" ]; then
                      npm install --include=optional --no-audit --no-fund
                  else
                      npm ci
                  fi

            # Not strictly required for `npm run build`, but the vite config
            # currently expects these env vars to be present.
            - name: Create .env file
              shell: bash
              run: |
                  echo TXDEV_FXSERVER_PATH=$(pwd)/fxserver > .env
                  echo TXDEV_VITE_URL='http://localhost:40122' >> .env

            - name: Build project
              run: npm run build
