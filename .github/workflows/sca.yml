# Software composition analysis — PR/push + weekly schedule.
# Policy: fail on high or critical (npm audit fix cleared highs; moderate dompurify/monaco may remain).
name: Dependency audit

on:
    push:
        branches: [master]
    pull_request:
        branches: ['**']
    schedule:
        - cron: '0 12 * * 1'

jobs:
    npm-audit:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 22
            - name: Install
              run: npm ci
            - name: npm audit (high or critical fails)
              run: npm audit --audit-level=high
